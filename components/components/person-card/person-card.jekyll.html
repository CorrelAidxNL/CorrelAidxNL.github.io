{% assign c = "c-person-card" %}
<article class="{{c}} col col-4 col-d-6 col-t-12">
  <div class="{{c}}__content">
    <a href="javascript:void(0)" class="{{c}}__image">
      <img loading="lazy" src="{{ include.person.image }}" alt="{{ include.person.displayname }}">
    </a>
    <div class="{{c}}__info">
      <div class="{{c}}__info-wrap">
        <h3 class="{{c}}__title">{{ include.person.fullname }}</h3>
      </div>
      <div class="{{c}}__info-wrap">
        {% if include.person.role %}
        <div class="{{c}}__subtitle">{{ include.person.role }}</div>
        {% endif %}
      </div>
    </div>
  </div>
</article>
